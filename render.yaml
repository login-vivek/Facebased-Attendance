services:
  - type: web
    name: face-recognition-flask
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    pythonVersion: "3.11.9"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: USE_CUDA
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
    disk:
      name: face-data
      mountPath: /opt/render/project/src/persistent_data
      sizeGB: 10
